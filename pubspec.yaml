name: vrtx_flutter
description: The official Flutter SDK for Vrtx — onboarding, wallet, and card flows for your app.
repository: https://github.com/vrtx-fintech/vrtx-flutter
issue_tracker: https://github.com/vrtx-fintech/vrtx-flutter/issues

version: 0.0.1

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

flutter:
  plugin:
    platforms:
      android:
        package: sa.vrtx.flutter
        pluginClass: VrtxFlutterPlugin
      ios:
        pluginClass: VrtxFlutterPlugin

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.0.0
