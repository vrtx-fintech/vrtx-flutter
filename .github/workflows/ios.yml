name: iOS

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ios:
    name: iOS
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Root pub get
        run: flutter pub get

      - name: Prepare example config
        run: cp example/lib/local_config.example.dart example/lib/local_config.dart

      - name: Create example iOS project
        working-directory: example
        run: flutter create --platforms=ios .

      - name: Example pub get
        working-directory: example
        run: flutter pub get

      - name: Analyze root package
        run: flutter analyze lib

      - name: Analyze example
        working-directory: example
        run: flutter analyze lib

      - name: Build iOS example
        working-directory: example
        run: flutter build ios --debug --no-codesign
