name: Release

on:
  # Cut a release by pushing a tag whose name matches the pubspec.yaml
  # version, e.g. `git tag v0.0.1 && git push origin v0.0.1` when
  # pubspec.yaml is at 0.0.1. pub.dev automated publishing only trusts the
  # OIDC `push` and `workflow_dispatch` events — GitHub `release` events
  # are NOT supported — so the tag push is what authorizes the publish.
  # See: https://dart.dev/tools/pub/automated-publishing
  push:
    tags:
      - "v*"
  # Manual escape hatch — useful for re-running a failed publish or for
  # publishing a hotfix tag created out-of-band. NOTE: OIDC publishing from
  # workflow_dispatch is disabled on pub.dev, so this path only publishes if
  # that event is enabled on the package admin and the run is dispatched
  # from the tag ref. To simply retry, prefer "Re-run jobs" on the tag-push
  # run — it preserves the tag ref and `push` event so OIDC still validates.
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v0.0.1). Must match pubspec.yaml version."
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # The `production` environment must exist in repo Settings → Environments
    # with at least one required reviewer. That reviewer's manual approval is
    # the gate that prevents an accidental publish from a tag push.
    environment:
      name: production
      url: https://pub.dev/packages/vrtx_flutter
    permissions:
      contents: read
      # Required for pub.dev OIDC-based automated publishing. Enable on
      # https://pub.dev/packages/vrtx_flutter/admin under "Automated publishing".
      # See: https://dart.dev/tools/pub/automated-publishing
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify tag matches pubspec.yaml version
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          pkg_version="v$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          if [ "$tag" != "$pkg_version" ]; then
            echo "::error::Tag $tag does not match pubspec.yaml version $pkg_version"
            exit 1
          fi
          echo "Releasing $pkg_version"

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib

      - name: Analyze
        run: flutter analyze lib

      - name: Test
        run: flutter test

      - name: Publish dry-run
        run: flutter pub publish --dry-run

      - name: Publish to pub.dev
        run: flutter pub publish --force

      # Announce the release in Slack, matching the iOS/Android SDK release
      # workflows. Failures are downgraded to warnings so a Slack outage or a
      # missing webhook never fails an otherwise successful publish.
      - name: Notify Slack
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${WEBHOOK}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL is not set; skipping release announcement."
            exit 0
          fi
          VERSION="${TAG#v}"
          TITLE="Flutter SDK ${VERSION} Available"
          # The pub.dev-published CHANGELOG entry doubles as the announcement
          # body, so notes are written once per release.
          NOTES="$(awk -v ver="${VERSION}" \
            '$0 == "## " ver {flag=1; next} /^## /{flag=0} flag' CHANGELOG.md)"
          if [ -z "${NOTES}" ]; then
            NOTES="See the changelog on pub.dev for details."
          fi
          # Slack section blocks reject text over 3000 characters.
          NOTES="${NOTES:0:2900}"
          PUB_URL="https://pub.dev/packages/vrtx_flutter/versions/${VERSION}"
          TAG_URL="https://github.com/${REPO}/tree/${TAG}"
          CONTEXT="<${PUB_URL}|pub.dev ${VERSION}> · <${TAG_URL}|Tag ${TAG}>"
          PAYLOAD=$(jq -n \
            --arg title "${TITLE}" \
            --arg notes "${NOTES}" \
            --arg context "${CONTEXT}" \
            '{
              blocks: [
                {type: "header", text: {type: "plain_text", text: $title}},
                {type: "section", text: {type: "mrkdwn", text: $notes}},
                {type: "context", elements: [{type: "mrkdwn", text: $context}]}
              ]
            }')
          response=$(curl -sS --fail-with-body -X POST \
            -H 'Content-Type: application/json' \
            --data "${PAYLOAD}" "${WEBHOOK}") || {
            echo "::warning::Slack webhook curl failed: ${response}"
            exit 0
          }
          if [ "${response}" != "ok" ]; then
            echo "::warning::Slack webhook responded: ${response}"
          fi
