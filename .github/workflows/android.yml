name: Android

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-example-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true

      # `example/lib/local_config.dart` is gitignored (it holds developer
      # credentials). Use the committed `.example.dart` template as a stub so
      # the example compiles in CI without exposing real secrets.
      - name: Stub local_config.dart
        run: cp lib/local_config.example.dart lib/local_config.dart
        working-directory: example

      # The example pulls the plugin via `path: ..`, so pub get must run in the
      # example dir for autolinking to wire up the Android module.
      - name: Install example dependencies
        run: flutter pub get
        working-directory: example

      - name: Build Android debug APK
        run: flutter build apk --debug
        working-directory: example
