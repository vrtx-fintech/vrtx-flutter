name: Android

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-example-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: stable
          cache: true

      # `example/lib/local_config.dart` is gitignored (it holds developer
      # credentials). Use the committed `.example.dart` template as a stub so
      # the example compiles in CI without exposing real secrets.
      - name: Stub local_config.dart
        run: cp lib/local_config.example.dart lib/local_config.dart
        working-directory: example

      # The example pulls the plugin via `path: ..`, so pub get must run in the
      # example dir for autolinking to wire up the Android module.
      - name: Install example dependencies
        run: flutter pub get
        working-directory: example

      - name: Build Android debug APK
        run: flutter build apk --debug
        working-directory: example
