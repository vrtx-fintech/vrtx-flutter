name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  flutter:
    name: Flutter
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Root pub get
        run: flutter pub get

      - name: Prepare example config
        run: cp example/lib/local_config.example.dart example/lib/local_config.dart

      - name: Example pub get
        working-directory: example
        run: flutter pub get

      - name: Analyze root package
        run: flutter analyze lib

      - name: Analyze example
        working-directory: example
        run: flutter analyze lib

      - name: Build Android example
        working-directory: example
        run: flutter build apk --debug
