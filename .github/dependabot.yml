version: 2
updates:
  - package-ecosystem: pub
    directory: /
    commit-message:
      prefix: "chore"
      include: "scope"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: pub
    directory: /example
    commit-message:
      prefix: "demo"
      include: "scope"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: gradle
    directory: /android
    commit-message:
      prefix: "chore"
      include: "scope"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: gradle
    directory: /example/android
    commit-message:
      prefix: "demo"
      include: "scope"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    commit-message:
      prefix: "ci"
      include: "scope"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
